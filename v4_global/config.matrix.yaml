# v4 global：全量 ADD prompt + 非空 LLM search（相对 v3 的两项改进）
# 密钥：configs/matrix_secrets.yaml（gitignore）
# 产物：workspaces/matrix_v4_global/

matrix_base_dir: workspaces/matrix_v4_global
database_prefix: eval_v4_global

add_backend: global_v4
search_mode: global

dataset_path: datasets/locomo_refined.json
max_conversations: null
max_questions_per_conversation: null
max_sessions_per_conversation: null

answer_prompt_mode: history
search_top_k: 30
concurrency: 2
search_llm_concurrency: 4
add_llm_concurrency: 4

memory_decision_prompt: prompts/memory_extract_global_v4.txt
memory_prompt_max_items: 0
search_llm_prompt: prompts/search_llm_v4.txt
search_llm_require_non_empty: true

add_history_window: 2
add_flush_per_session: true

parallel_models: 1
parallel_search: 2
matrix_log_mode: session
matrix_log_prefix: matrix_v4_global_run

add_repeats: 3
search_repeats: 1
reuse_legacy_add_run01: false
reset_database_on_add: true

eval:
  metrics:
    - llm
    - f1
    - bleu
  dataset_name: locomo

pipeline_llm_model_id: deepseek

add_models:
  - id: deepseek
    model: deepseek-v4-flash
  - id: minimax
    model: MiniMax-M2.7
    llm_thinking_mode: split

search_backends:
  - hybrid_llm
  - llm
  - rag

search_hybrid_recall_k: 80
search_hybrid_rrf_k: 60
