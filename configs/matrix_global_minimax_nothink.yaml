# MiniMax global add（无 thinking 实验线）：与 matrix_global/minimax 完全隔离
# - 独立 workspace / DB / status / 日志
# - llm_thinking_mode: disabled（API 仍可能内部推理，pipeline 只用 strip 后的 content）

matrix_base_dir: workspaces/matrix_global_minimax_nothink
database_prefix: eval_pipeline_global_mm_nt

add_backend: global
search_mode: global

dataset_path: datasets/locomo_refined.json
max_conversations: null
max_questions_per_conversation: null
max_sessions_per_conversation: null

answer_prompt_mode: history
search_top_k: 30
concurrency: 2
search_llm_concurrency: 4
add_llm_concurrency: 4

add_history_window: 2
add_flush_per_session: true

parallel_models: 1
parallel_search: 2
matrix_log_mode: session
matrix_log_prefix: matrix_global_minimax_nothink

add_repeats: 3
search_repeats: 1
reuse_legacy_add_run01: false
reset_database_on_add: true

eval:
  metrics:
    - llm
    - f1
    - bleu
  dataset_name: locomo

pipeline_llm_model_id: minimax

add_models:
  - id: minimax
    model: MiniMax-M2.7
    llm_thinking_mode: disabled

search_backends:
  - llm
  - rag
