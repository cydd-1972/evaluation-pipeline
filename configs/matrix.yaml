# 矩阵实验：add 仅 MiniMax；eval 裁判用 .env 的 EVALUATOR_*（Qwen）
#   1 模型 × add 3 次 × search 2 种(llm/rag) 各 1 次 = 9 runs
#   add_run01 复用旧 workspaces/matrix/<model>/_add（已跑过 1 次 add）
# 密钥：configs/matrix_secrets.yaml（gitignore，勿提交）

matrix_base_dir: workspaces/matrix
database_prefix: eval_pipeline

dataset_path: datasets/locomo_refined.json
max_conversations: null
max_questions_per_conversation: null
max_sessions_per_conversation: null

answer_prompt_mode: history
search_top_k: 30
concurrency: 1
# LLM search / add：每批并发 API 数（一批全部返回后再发下一批）
search_llm_concurrency: 4
add_llm_concurrency: 4

# 并行编排（run_matrix 默认）
parallel_models: 1      # 当前仅 minimax add
parallel_search: 2      # search+answer 并行上限（降低 Postgres / embedding 争抢）
# session=每次 run 写入新文件 matrix_run_YYYYMMDD_HHMMSS.log；append=追加到 matrix_log_file
matrix_log_mode: session
matrix_log_prefix: matrix_run
# matrix_log_file: matrix_run.log

add_repeats: 3
search_repeats: 1
reuse_legacy_add_run01: true   # add_run01 用旧库 eval_pipeline_matrix_<model>_add，不 DROP
reset_database_on_add: true    # 仅 add_run02/03 建新库；run01 有 snapshot 时自动 skip reset

eval:
  metrics:
    - llm
    - f1
    - bleu
  dataset_name: locomo

pipeline_llm_model_id: minimax

add_models:
  - id: minimax
    model: MiniMax-M2.7

search_backends:
  - llm
  - rag
