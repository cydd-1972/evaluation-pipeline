# v3 提示词 + Gemini add（1×add + llm/rag），与 matrix_global / dsv2 完全隔离
# workspace: workspaces/v3/minimax/gemini/...
# search_llm 用 deepseek；eval 由 scripts/run_v3_gemini_matrix.py 注入百炼 key

matrix_base_dir: workspaces/v3/minimax
database_prefix: eval_pipeline_v3_minimax

add_backend: global
search_mode: global
memory_decision_prompt: memory_decision_global_v3.txt

dataset_path: datasets/locomo_refined.json
max_conversations: null
max_questions_per_conversation: null
max_sessions_per_conversation: null

answer_prompt_mode: history
search_top_k: 30
concurrency: 2
search_llm_concurrency: 4
add_llm_concurrency: 4

add_history_window: 2
add_flush_per_session: true

parallel_models: 1
parallel_search: 2
matrix_log_mode: session
matrix_log_prefix: matrix_v3_minimax_gemini

add_repeats: 1
search_repeats: 1
reuse_legacy_add_run01: false
reset_database_on_add: true

eval:
  metrics:
    - llm
    - f1
    - bleu
  dataset_name: locomo

pipeline_llm_model_id: deepseek

add_models:
  - id: gemini
    model: gemini-3.1-flash-lite-preview

search_backends:
  - llm
  - rag
