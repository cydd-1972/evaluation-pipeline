# DeepSeek 新提示词单次全流程（独立目录，勿与 matrix_global 混用）
# 1×add + llm/rag search = 3 runs；不清理 matrix_global 历史数据

matrix_base_dir: workspaces/matrix_global_deepseek_v2
database_prefix: eval_pipeline_global_v2

add_backend: global
search_mode: global

dataset_path: datasets/locomo_refined.json
max_conversations: null
max_questions_per_conversation: null
max_sessions_per_conversation: null

answer_prompt_mode: history
search_top_k: 30
concurrency: 2
search_llm_concurrency: 4
add_llm_concurrency: 4

add_history_window: 2
add_flush_per_session: true

parallel_models: 1
parallel_search: 2
matrix_log_mode: session
matrix_log_prefix: matrix_global_deepseek_v2

add_repeats: 1
search_repeats: 1
reuse_legacy_add_run01: false
reset_database_on_add: true

eval:
  metrics:
    - llm
    - f1
    - bleu
  dataset_name: locomo

pipeline_llm_model_id: deepseek

add_models:
  - id: deepseek
    model: deepseek-v4-flash

search_backends:
  - llm
  - rag
